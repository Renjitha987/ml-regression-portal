<!DOCTYPE html>
<html>

<head>
<title>Multiple Linear Regression</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Car Price Prediction</h1>

<form method="post">

<input type="number" name="price" placeholder="Present Price" required>

<br><br>

<input type="number" name="kms" placeholder="Kilometers Driven" required>

<br><br>

<input type="text" name="fuel" placeholder="Fuel Type (Petrol/Diesel/CNG)" required>

<br><br>

<input type="text" name="trans" placeholder="Transmission (Manual/Automatic)" required>

<br><br>

<button type="submit">Predict</button>

</form>

</div>

</body>
</html>
